<!DOCTYPE html>
<html lang="id">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>PoolTick CMS</title>
  
  <script src="https://cdnjs.cloudflare.com/ajax/libs/xlsx/0.18.5/xlsx.full.min.js"></script>
  <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;600;700&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.1/font/bootstrap-icons.css">
  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">

  <link rel="stylesheet" href="/css/style.css">
</head>
<body>

<div id="login-page">
  <div class="card login-card p-5 text-center bg-white">
      <div class="display-4 text-primary mb-3"><i class="bi bi-water"></i></div>
      <h3 class="fw-bold mb-1">PoolTick CMS</h3>
      <p class="text-muted small mb-4">Portal Administrasi Kolam Renang</p>
      <div class="text-start mb-3">
          <label class="small fw-bold mb-1">Username</label>
          <input type="text" id="username" class="form-control" placeholder="Username">
      </div>
      <div class="text-start mb-4">
          <label class="small fw-bold mb-1">Password</label>
          <input type="password" id="password" class="form-control" placeholder="Password">
      </div>
      <button onclick="login()" class="btn btn-primary w-100 py-3 fw-bold rounded-pill shadow">Login Sekarang</button>
  </div>
</div>

<div id="dashboard" style="display:none;">
  <nav class="navbar navbar-expand-lg sticky-top shadow-sm">
    <div class="container">
      <span class="navbar-brand fw-bold text-primary fs-4"><i class="bi bi-water me-2"></i>PoolTick</span>
      <div class="dropdown">
        <button class="btn btn-light rounded-pill dropdown-toggle px-3" data-bs-toggle="dropdown">
          <i class="bi bi-person-circle me-1"></i> <b>Admin</b>
        </button>
        <ul class="dropdown-menu dropdown-menu-end shadow border-0">
          <li>
            <button onclick="logout()" class="dropdown-item text-danger">
              <i class="bi bi-box-arrow-right me-2"></i>Logout
            </button>
          </li>
        </ul>
      </div>
    </div>
  </nav>

  <div class="container py-4">
    <div class="row g-4 mb-4">
      <div class="col-lg-8">
        <div class="card stat-card p-4 h-100 d-flex flex-row align-items-center justify-content-between">
          <div>
            <h6 class="text-uppercase small opacity-75 fw-bold mb-1">Total Pendapatan Hari Ini</h6>
            <h1 id="total" class="fw-bold mb-0 display-4">Rp 0</h1>
          </div>
          <i class="bi bi-wallet2 display-1 opacity-25"></i>
        </div>
      </div>
      <div class="col-lg-4">
        <div class="card p-4 h-100 shadow-sm border-0">
          <h6 class="text-muted small fw-bold text-uppercase mb-3">Laporan Penjualan</h6>
          <button onclick="downloadExcel()" class="btn btn-success w-100 py-3 fw-bold rounded-4 shadow-sm">
            <i class="bi bi-file-earmark-spreadsheet me-2"></i>Download Excel
          </button>
        </div>
      </div>
    </div>

    <div class="row g-4">
      <div class="col-xl-4">
        <div class="sticky-top" style="top: 90px;">
          <div class="card p-4 mb-4 border-0 shadow-sm" style="border-left: 5px solid var(--success) !important;">
            <h6 class="fw-bold text-success mb-3 small text-uppercase"><i class="bi bi-person-plus me-2"></i>Data Pelanggan</h6>
            <input type="text" id="buyerName" class="form-control" placeholder="Nama lengkap pembeli...">
            <small class="text-muted mt-2 d-block">*Wajib diisi sebelum transaksi</small>
          </div>

          <div class="card p-4 shadow-sm border-0">
            <h6 class="fw-bold mb-3 text-primary text-uppercase small"><i class="bi bi-pencil-square me-2"></i>Kelola Katalog</h6>
            <input type="hidden" id="editId">
            <div class="mb-3">
              <label class="small text-muted fw-bold">Nama Tiket</label>
              <input type="text" id="name" class="form-control mt-1" placeholder="Misal: Tiket Weekend">
            </div>
            <div class="mb-4">
              <label class="small text-muted fw-bold">Harga Satuan (IDR)</label>
              <input type="number" id="price" class="form-control mt-1" placeholder="50000">
            </div>
            <div class="d-grid gap-2">
              <button onclick="submitTiket()" id="btnSave" class="btn btn-primary py-3 fw-bold rounded-3 shadow">
                <i class="bi bi-save me-2"></i>Simpan Data Tiket
              </button>
              <button onclick="resetForm()" class="btn btn-light btn-sm">Batal / Reset</button>
            </div>
          </div>
        </div>
      </div>

      <div class="col-xl-8">
        <ul class="nav nav-tabs mb-4 shadow-sm" id="pills-tab" role="tablist">
          <li class="nav-item flex-fill">
            <button class="nav-link active w-100" data-bs-toggle="pill" data-bs-target="#tab-katalog"><i class="bi bi-grid-fill me-2"></i>Katalog Tiket</button>
          </li>
          <li class="nav-item flex-fill">
            <button class="nav-link w-100" data-bs-toggle="pill" data-bs-target="#tab-transaksi"><i class="bi bi-clock-history me-2"></i>Riwayat Transaksi</button>
          </li>
        </ul>

        <div class="tab-content" id="pills-tabContent">
          <div class="tab-pane fade show active" id="tab-katalog">
            <div class="table-container shadow-sm border-0">
              <div class="d-flex justify-content-between align-items-center mb-4">
                <h5 class="fw-bold m-0 text-primary">Daftar Tiket</h5>
                <input type="text" class="form-control w-50" placeholder="Cari tiket..." id="searchTicket" onkeyup="filterTable()">
              </div>
              <div class="table-responsive">
                <table class="table table-hover align-middle">
                  <thead class="bg-light">
                    <tr class="text-uppercase small fw-bold text-center">
                      <th class="py-3">ID</th>
                      <th class="py-3">NAMA TIKET</th>
                      <th class="py-3">HARGA</th>
                      <th class="py-3">KELOLA & BELI</th>
                    </tr>
                  </thead>
                  <tbody id="data"></tbody>
                </table>
              </div>
              <div class="text-end mt-4">
                <button onclick="beliSemua()" class="btn btn-success px-5 py-3 fw-bold rounded-pill shadow">
                  <i class="bi bi-cart-check me-2"></i>Checkout Terpilih
                </button>
              </div>
            </div>
          </div>

          <div class="tab-pane fade" id="tab-transaksi">
            <div class="table-container shadow-sm border-0">
              <div class="d-flex justify-content-between align-items-center mb-4">
                <h5 class="fw-bold m-0 text-primary">Log Transaksi</h5>
                <button onclick="hapusSemuaTransaksi()" class="btn btn-outline-danger btn-sm rounded-pill px-3 fw-bold">
                  <i class="bi bi-trash3-fill me-1"></i>Bersihkan Riwayat
                </button>
              </div>
              <div class="table-responsive">
                <table class="table table-hover align-middle">
                  <thead class="bg-light">
                    <tr class="text-uppercase small fw-bold text-center">
                      <th class="py-3">ID</th>
                      <th class="py-3">PEMBELI</th>
                      <th class="py-3">TIKET</th>
                      <th class="py-3">NOMINAL</th>
                      <th class="py-3">WAKTU</th>
                      <th class="py-3">AKSI</th>
                    </tr>
                  </thead>
                  <tbody id="transaksi"></tbody>
                </table>
              </div>
            </div>
          </div>
        </div>
      </div>
    </div>
  </div>
</div>

<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>

<script src="/js/api.js"></script>
<script src="/js/utils.js"></script>
<script src="/js/auth.js"></script>
<script src="/js/tickets.js"></script>
<script src="/js/transactions.js"></script>

</body>
</html>
